name: Validation

on:
  pull_request:
    branches: main
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
        working-directory: validation

      - run: npm run validate
        working-directory: validation
        env:
          BRANCH_NAME: ${{ github.head_ref }}